name: Build and Package Blazor

on:
  push:
    tags:
      - 'v*' # Se déclenche uniquement sur les tags de version (ex: v1.2)

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x 

      - name: Restore dependencies
        run: dotnet restore

      # On build le projet SERVER qui englobe les autres
      - name: Publish Server Project
        run: dotnet publish Server/TradeUp.Server.csproj -c Release -o ./publish

      - name: Zip the build
        run: zip -r tombolix-${{ github.ref_name }}.zip ./publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tombolix-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
